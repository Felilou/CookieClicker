spring.application.name=persistance-service
server.port=8082
spring.config.import=optional:file:.env[.properties]

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:${APP_DB_PORT:5434}/${APP_DB_NAME:cookieclicker}
spring.datasource.username=${APP_DB_USER:postgres}
spring.datasource.password=${APP_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Connection Pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000

# JWT Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_URL:http://localhost:8180}/realms/${KEYCLOAK_REALM:cookieclicker}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_URL:http://localhost:8180}/realms/${KEYCLOAK_REALM:cookieclicker}/protocol/openid-connect/certs

# Auth Service Configuration
auth-service.url=${AUTH_SERVICE_URL:http://localhost:8081}

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.at.spengergasse=DEBUG
logging.level.com.zaxxer.hikari=DEBUG
logging.level.org.hibernate.SQL=DEBUG