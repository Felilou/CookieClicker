spring.application.name=persistance-service
server.port=8082

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5434/cookieclicker
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Connection Pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000

# JWT Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/cookieclicker
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/cookieclicker/protocol/openid-connect/certs

# Auth Service Configuration
auth-service.url=http://localhost:8081

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.at.spengergasse=DEBUG
logging.level.com.zaxxer.hikari=DEBUG
logging.level.org.hibernate.SQL=DEBUG
