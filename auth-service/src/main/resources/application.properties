spring.application.name=auth-service
server.port=8081
spring.config.import=optional:file:.env[.properties]

# Keycloak Configuration (admin API calls use internal URL in Docker)
keycloak.auth-server-url=${KEYCLOAK_INTERNAL_URL:http://localhost:8180}
keycloak.realm=${KEYCLOAK_REALM:cookieclicker}
keycloak.client-id=${KEYCLOAK_CLIENT_ID:cookieclicker-client}
keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:5SSSXJd0Q9sYlSdMNVC8LifE7KqufRau}

# Keycloak Admin Credentials (for user registration via Admin API)
keycloak.admin-username=${KEYCLOAK_ADMIN:admin}
keycloak.admin-password=${KEYCLOAK_ADMIN_PASSWORD:admin}

# JWT Configuration
# issuer-uri must match the 'iss' claim in tokens (always the external URL)
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_URL:http://localhost:8180}/realms/${KEYCLOAK_REALM:cookieclicker}
# jwk-set-uri uses the internal URL in Docker to avoid loopback issues
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_INTERNAL_URL:http://localhost:8180}/realms/${KEYCLOAK_REALM:cookieclicker}/protocol/openid-connect/certs

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761}/eureka/
eureka.instance.prefer-ip-address=true

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.at.spengergasse=DEBUG
