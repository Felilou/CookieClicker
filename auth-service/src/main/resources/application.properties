server.port=8081
spring.config.import=optional:file:.env[.properties]

# Keycloak Configuration
keycloak.auth-server-url=${KEYCLOAK_URL:http://localhost:8180}
keycloak.realm=${KEYCLOAK_REALM:cookieclicker}
keycloak.client-id=${KEYCLOAK_CLIENT_ID:cookieclicker-client}
keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:5SSSXJd0Q9sYlSdMNVC8LifE7KqufRau}

# Keycloak Admin Credentials (for user registration via Admin API)
keycloak.admin-username=${KEYCLOAK_ADMIN:admin}
keycloak.admin-password=${KEYCLOAK_ADMIN_PASSWORD:admin}

# JWT Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_URL:http://localhost:8180}/realms/${KEYCLOAK_REALM:cookieclicker}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_URL:http://localhost:8180}/realms/${KEYCLOAK_REALM:cookieclicker}/protocol/openid-connect/certs

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.at.spengergasse=DEBUG
