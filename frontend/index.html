<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookieClicker - Willkommen</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="auth-card">
            <h1>🍪</h1>
            <h2>Willkommen bei CookieClicker</h2>

            <p style="text-align: center; color: #666; margin: 20px 0;">
                Ein modernes Microservice-Projekt mit Keycloak Authentication
            </p>

            <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 30px;">
                <a href="login.html" class="btn btn-primary" style="text-decoration: none; text-align: center;">
                    Login
                </a>
                <a href="signup.html" class="btn btn-secondary" style="text-decoration: none; text-align: center;">
                    Registrieren
                </a>
            </div>

            <div style="margin-top: 40px; padding-top: 30px; border-top: 1px solid #e0e0e0;">
                <h3 style="text-align: center; color: #333; margin-bottom: 15px;">Features</h3>
                <ul style="list-style: none; padding: 0; color: #666;">
                    <li style="padding: 8px 0;">✅ User-Registrierung & Login</li>
                    <li style="padding: 8px 0;">✅ JWT Token Authentication</li>
                    <li style="padding: 8px 0;">✅ Geschützte Stats-Seite</li>
                    <li style="padding: 8px 0;">✅ Keycloak OAuth2/OIDC</li>
                </ul>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        // Wenn User bereits eingeloggt ist, direkt zu Stats
        if (isAuthenticated()) {
            window.location.href = 'stats.html';
        }
    </script>
</body>
</html>
